name: Build & Release APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. v0.2.0)"
        required: true
        default: "v0.2.0"
      target_commit:
        description: "Commit SHA or Branch (اتركه فارغاً لبناء آخر كوميت)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Repository (With Target Commit Support) 🌟
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_commit }}

      # 2️⃣ Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # 3️⃣ Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 4️⃣ Dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5️⃣ استخراج ملف الـ .env السرّي من إعدادات المستودع 🔥
      - name: Create .env file from GitHub Secrets
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

      # 6️⃣ Build split APKs 🔥
      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      # 7️⃣ Rename APKs 🔥
      - name: Rename APKs
        run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk Shreyan-${{ github.event.inputs.version_name }}-arm64.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk Shreyan-${{ github.event.inputs.version_name }}-armv7.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk Shreyan-${{ github.event.inputs.version_name }}-x86_64.apk

      # 8️⃣ استخراج معلومات الكوميت للمسة الاحترافية 🌟
      - name: Get Commit Info
        id: commit_info
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "msg=$(git log -1 --pretty=format:'%s')" >> $GITHUB_OUTPUT

      # 9️⃣ Create Release + Upload 🚀
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_name }}
          name: Shreyan ${{ github.event.inputs.version_name }}
          body: |
            🚀 **إصدار جديد Shreyan: ${{ github.event.inputs.version_name }}**
            
            **معلومات البناء (Build Info):**
            - 📌 **رمز الكوميت (Commit):** `${{ steps.commit_info.outputs.sha }}`
            - 📝 **رسالة الكوميت:** ${{ steps.commit_info.outputs.msg }}
          files: |
            Shreyan-${{ github.event.inputs.version_name }}-arm64.apk
            Shreyan-${{ github.event.inputs.version_name }}-armv7.apk
            Shreyan-${{ github.event.inputs.version_name }}-x86_64.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}